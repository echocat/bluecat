# /nix is backed by /var/nix on bootc/rpm-ostree systems, because the
# deployment root is immutable at runtime.
d /nix 0755 root root - -
d /nix/store 1775 root nixbld - -
d /nix/var 0755 root root - -
d /nix/var/log 0755 root root - -
d /nix/var/log/nix 0755 root root - -
d /nix/var/log/nix/drvs 0775 root nixbld - -
d /nix/var/nix 0775 root nixbld - -
d /nix/var/nix/builds 0755 root root 7d -
d /nix/var/nix/daemon-socket 0755 root root - -
d /nix/var/nix/db 0755 root root - -
d /nix/var/nix/gc-socket 0755 root root - -
d /nix/var/nix/gcroots 0755 root root - -
d /nix/var/nix/gcroots/per-user 1777 root root - -
d /nix/var/nix/profiles 0755 root root - -
d /nix/var/nix/profiles/per-user 1777 root root - -
d /nix/var/nix/temproots 0755 root root - -
