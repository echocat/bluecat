name: Dependencies

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependencies-update
  cancel-in-progress: true

jobs:
  update:
    name: Update dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GORELEASER_TOKEN }}

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Update dependencies
        run: mise dependencies:update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GORELEASER_TOKEN }}
          author: echocat-bot <16277609+echocatbot@users.noreply.github.com>
          committer: echocat-bot <16277609+echocatbot@users.noreply.github.com>
          branch: automation/dependencies
          delete-branch: true
          add-paths: |
            dependencies.yaml
            dependencies.known.yaml
          commit-message: Update dependencies
          title: Update dependencies
          body: |
            Automated dependency update.

            Generated by `mise dependencies:update`.
