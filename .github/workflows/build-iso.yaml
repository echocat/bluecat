name: Build ISO Image

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"

concurrency:
  group: build-iso-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build ISO
        run: mise build:iso

      - name: Publish rolling ISO
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! gh release view rolling >/dev/null 2>&1; then
            gh release create rolling \
              --title "rolling" \
              --notes "Rolling bluecat netinstall ISO." \
              --latest=false
          fi

          gh release upload rolling \
            output/bluecat-netinstall.iso#bluecat.iso \
            --clobber
