name: Build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  pull_request:

concurrency:
  group: build-image-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: "Build and Push/Publish"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          cache: false # Because otherwise we might run in space issues

      - name: Restore signing certificates from secrets
        run: |
          set -euo pipefail
          mkdir -p certs
          rm -rf certs/mok.* certs/cosign.*
          printf '%s' "${{ secrets.MOK_KEY }}" > certs/mok.key
          printf '%s' "${{ secrets.MOK_CRT }}" > certs/mok.crt
          printf '%s' "${{ secrets.MOK_DER_B64 }}" | base64 -d > certs/mok.der
          printf '%s' "${{ secrets.COSIGN_KEY }}" > certs/cosign.key
          printf '%s' "${{ secrets.COSIGN_PUB }}" > certs/cosign.pub
          chmod 600 certs/mok.key
          chmod 644 certs/mok.crt certs/mok.der
          chmod 600 certs/cosign.key
          chmod 644 certs/cosign.pub
          echo "signing certificates restored"

      - name: Verify signing certificates
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: mise verify-keys

      - name: Clean runner
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Prepare CI container storage
        run: |
          set -euo pipefail

          echo "==> Disk before cleanup"
          df -h

          echo "==> Removing unused hosted runner payloads"
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            ~/.local/share/containers/storage/ \
            /root/.local/share/containers/storage/ \
            /var/lib/share/containers/storage/
          docker image prune --all --force || true
          docker builder prune --all --force || true
          sudo apt-get clean

          echo "==> Configuring rootless Podman storage on /mnt"
          sudo mkdir -p /mnt/containers-storage
          sudo chown "${USER}:${USER}" /mnt/containers-storage
          mkdir -p "${RUNNER_TEMP}/containers-runroot"
          cat > "${RUNNER_TEMP}/containers-storage.conf" <<EOF
          [storage]
          driver = "overlay"
          runroot = "${RUNNER_TEMP}/containers-runroot"
          rootless_storage_path = "/mnt/containers-storage"
          EOF

          echo "CONTAINERS_STORAGE_CONF=${RUNNER_TEMP}/containers-storage.conf" >> "${GITHUB_ENV}"

          echo "==> Disk after cleanup"
          df -h

      - name: Show container tool versions
        run: |
          set -euo pipefail

          podman --version
          buildah --version || true
          skopeo --version || true
          podman build --help | grep -E 'source-date-epoch|rewrite-timestamp|timestamp' || true

      # Build all artifacts locally first. Publishing only happens after the ISO
      # build has succeeded, so a broken ISO never follows a pushed release tag.
      - name: Build Image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: mise build:image

      - name: Build Chunked Image
        run: mise build:chunked-image

      - name: Build ISO
        run: mise build:iso

      - name: Push (release, main only)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG_RETENTION: "3"
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: mise publish:image release

      - name: Push (pr test image)
        if: (github.event_name == 'pull_request' && github.event.label.name == 'test image')
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: mise publish:image pr "${{ github.event.pull_request.number }}"

      - name: Publish rolling ISO (release, main only)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        env:
          ISO_S3_ACCESS_KEY_ID: ${{ secrets.ISO_S3_ACCESS_KEY_ID }}
          ISO_S3_SECRET_ACCESS_KEY: ${{ secrets.ISO_S3_SECRET_ACCESS_KEY }}
        run: mise publish:iso

      - name: Clean up (remove keys)
        if: always()
        run: rm -f certs/mok.key certs/mok.crt certs/mok.der certs/cosign.key certs/cosign.pub

      - name: Clean up build artifacts
        if: always()
        run: |
          set -euo pipefail

          if command -v podman >/dev/null 2>&1; then
            podman system prune --all --force --volumes || true
            sudo podman system prune --all --force --volumes || true
          fi

          sudo rm -rf /mnt/containers-storage "${RUNNER_TEMP}/containers-runroot"

          echo "==> Disk after build artifact cleanup"
          df -h
