name: Mise Tools

on:
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: mise-tools-update
  cancel-in-progress: true

jobs:
  update:
    name: Update mise tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GORELEASER_TOKEN }}

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Update mise tools
        run: mise tools:update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GORELEASER_TOKEN }}
          author: echocat-bot <16277609+echocatbot@users.noreply.github.com>
          committer: echocat-bot <16277609+echocatbot@users.noreply.github.com>
          branch: automation/mise-tools
          delete-branch: true
          add-paths: |
            mise.toml
          commit-message: Update mise tools
          title: Update mise tools
          body: |
            Automated mise tool update.

            Generated by `mise tools:update`.
