name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/branding/bluecat-logo-symbol.svg"
      - "assets/branding/bluecat-logo-white.svg"
      - "mise.toml"
      - "mise-tasks/build/site"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build site
        run: mise build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/site

  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
