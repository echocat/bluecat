name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/**"
      - "mise.toml"
      - "mise-tasks/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build
        run: mise build:site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
