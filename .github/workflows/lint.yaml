name: Lint

on:
  push:
    branches: [main]
    paths:
      - "Containerfile"
      - "image/**"
      - "mise-tasks/**"
      - "docs/**"
      - "README.md"
      - "NOTICE.md"
      - "mise.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "Containerfile"
      - "image/**"
      - "mise-tasks/**"
      - "docs/**"
      - "README.md"
      - "NOTICE.md"
      - "mise.toml"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Lint
        run: mise lint
